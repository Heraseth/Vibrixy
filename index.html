<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Vibe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  font-family:system-ui,sans-serif;color:#fff
}
.card{text-align:center;padding:3rem}
h1{
  font-size:3rem;font-weight:900;margin-bottom:1rem;letter-spacing:-.04em;
  background:linear-gradient(90deg,#a78bfa,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent
}
p{color:rgba(255,255,255,.6);font-size:1.1rem}
.btn{
  margin-top:2rem;padding:.75rem 2rem;background:#8b5cf6;color:#fff;
  border:none;border-radius:9999px;font-size:1rem;font-weight:600;
  cursor:pointer;transition:transform .15s,box-shadow .15s
}
.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 25px rgba(139,92,246,.5)
}
</style>
</head>
<body>
<div class="card">
  <h1>Hello Vibrixy</h1>
  <p>Start vibing — edit this or use AI to generate something new.</p>
  <button class="btn" onclick="this.textContent='✨ Vibed!'">Vibe It</button>
</div>
</body>
</html>
